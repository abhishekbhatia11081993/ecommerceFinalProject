name: CI/CD Pipeline - Build & Deploy to AWS Elastic Beanstalk

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EB_APPLICATION_NAME: ${{ secrets.EB_APPLICATION_NAME }}
  EB_ENVIRONMENT_NAME: ${{ secrets.EB_ENVIRONMENT_NAME }}
  S3_BUCKET: ${{ secrets.EB_S3_BUCKET }}

jobs:

  # ──────────────────────────────────────────────
  # JOB 1: Build & Test
  # ──────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests -B

      - name: Run tests
        run: mvn test -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 5

  # ──────────────────────────────────────────────
  # JOB 2: Deploy to AWS Elastic Beanstalk
  # Runs only on push to master/main (NOT on PRs)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to Elastic Beanstalk
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Generate deployment package
        run: |
          VERSION_LABEL="shopplus-$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::8}"
          echo "VERSION_LABEL=$VERSION_LABEL" >> $GITHUB_ENV

          # Create deployment zip with JAR, Procfile, and .ebextensions
          cd target
          JAR_FILE=$(ls *.jar | head -1)
          cd ..
          cp target/$JAR_FILE application.jar
          zip -r deploy.zip application.jar Procfile .ebextensions/ .platform/ || zip -r deploy.zip application.jar Procfile .ebextensions/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload to S3
        run: |
          aws s3 cp deploy.zip s3://${{ env.S3_BUCKET }}/${{ env.VERSION_LABEL }}.zip

      - name: Create EB application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "${{ env.EB_APPLICATION_NAME }}" \
            --version-label "${{ env.VERSION_LABEL }}" \
            --source-bundle S3Bucket="${{ env.S3_BUCKET }}",S3Key="${{ env.VERSION_LABEL }}.zip" \
            --auto-create-application

      - name: Deploy to EB environment
        run: |
          aws elasticbeanstalk update-environment \
            --application-name "${{ env.EB_APPLICATION_NAME }}" \
            --environment-name "${{ env.EB_ENVIRONMENT_NAME }}" \
            --version-label "${{ env.VERSION_LABEL }}"

      - name: Wait for deployment to complete
        run: |
          echo "Waiting for environment to be ready..."
          aws elasticbeanstalk wait environment-updated \
            --application-name "${{ env.EB_APPLICATION_NAME }}" \
            --environment-names "${{ env.EB_ENVIRONMENT_NAME }}"
          echo "Deployment complete!"

      - name: Get environment URL
        run: |
          URL=$(aws elasticbeanstalk describe-environments \
            --application-name "${{ env.EB_APPLICATION_NAME }}" \
            --environment-names "${{ env.EB_ENVIRONMENT_NAME }}" \
            --query "Environments[0].CNAME" --output text)
          echo "Application deployed at: http://$URL"
