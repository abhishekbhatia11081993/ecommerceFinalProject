<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{fragments/header :: head}" />
    <title th:text="${product.name + ' | Shop+'}">Product | Shop+</title>
</head>
<body>

    <th:block th:replace="~{fragments/header :: header}" />

    <div class="pg-header">
        <div class="container">
            <div class="row">
                <div class="col-md-6 col-sm-12 title">
                    <h1 th:text="${product.name}">Product Name</h1>
                </div>
                <div class="col-md-6 col-sm-12">
                    <div class="b-crumbs pull-right">
                        <a th:href="@{/products}">Home</a> <i class="arrow_carrot-right"></i>
                        <a th:href="@{/products(category=${product.category})}" th:text="${product.category}">Category</a> <i class="arrow_carrot-right"></i>
                        <span th:text="${product.name}">Product</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="pg-body">
        <div class="container">
            <!-- Product Detail -->
            <div class="row" style="margin-bottom:40px;">
                <div class="col-md-5 col-sm-6">
                    <div style="background:#f8f8f8; padding:20px; text-align:center; min-height:400px; display:flex; align-items:center; justify-content:center;">
                        <img th:src="${product.imageUrl}" th:alt="${product.name}" style="max-width:100%; max-height:400px; object-fit:contain;">
                    </div>
                    <div th:if="${product.imageUrl2 != null}" style="margin-top:10px; background:#f8f8f8; padding:10px; text-align:center;">
                        <img th:src="${product.imageUrl2}" th:alt="${product.name}" style="max-height:80px; cursor:pointer;">
                    </div>
                </div>
                <div class="col-md-7 col-sm-6">
                    <div style="padding-left:20px;">
                        <span th:if="${product.onSale}" class="label" style="background:#e74c3c; color:#fff; font-size:11px; padding:4px 12px; text-transform:uppercase;">Sale</span>
                        <span th:if="${product.newArrival}" class="label" style="background:#2ecc71; color:#fff; font-size:11px; padding:4px 12px; text-transform:uppercase;">New Arrival</span>
                        <span th:if="${product.featured}" class="label" style="background:#3498db; color:#fff; font-size:11px; padding:4px 12px; text-transform:uppercase;">Featured</span>

                        <h2 th:text="${product.name}" style="margin-top:15px;">Product Name</h2>

                        <div style="margin:10px 0;">
                            <span th:each="i : ${#numbers.sequence(1, 5)}"
                                  th:style="${i <= product.rating} ? 'color:#f39c12; font-size:16px;' : 'color:#ddd; font-size:16px;'">&#9733;</span>
                            <span style="color:#999; margin-left:8px;" th:text="'(' + ${product.rating} + ' rating)'"></span>
                        </div>

                        <div style="margin:20px 0;">
                            <span class="active" style="font-size:28px; font-weight:600;" th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}">$0.00</span>
                            <span th:if="${product.oldPrice != null}" style="text-decoration:line-through; color:#999; margin-left:12px; font-size:18px;" th:text="'$' + ${#numbers.formatDecimal(product.oldPrice, 1, 2)}">$0.00</span>
                            <span th:if="${product.oldPrice != null}" style="background:#e74c3c; color:#fff; font-size:11px; padding:3px 8px; margin-left:8px;"
                                  th:text="'-' + ${#numbers.formatDecimal((product.oldPrice - product.price) / product.oldPrice * 100, 1, 0)} + '%'">-20%</span>
                        </div>

                        <div style="border-top:1px solid #eee; border-bottom:1px solid #eee; padding:15px 0; margin:15px 0;">
                            <table style="width:100%;">
                                <tr>
                                    <td style="padding:5px 0; color:#999; width:120px;">Category:</td>
                                    <td><a th:href="@{/products(category=${product.category})}" th:text="${product.category}" class="active">Category</a></td>
                                </tr>
                                <tr>
                                    <td style="padding:5px 0; color:#999;">Brand:</td>
                                    <td th:text="${product.brand}">Brand</td>
                                </tr>
                                <tr>
                                    <td style="padding:5px 0; color:#999;">Availability:</td>
                                    <td>
                                        <span th:if="${product.stockQuantity > 0}" style="color:#2ecc71; font-weight:600;">In Stock</span>
                                        <span th:if="${product.stockQuantity <= 0}" style="color:#e74c3c; font-weight:600;">Out of Stock</span>
                                        <span th:if="${product.stockQuantity > 0}" style="color:#999;" th:text="'(' + ${product.stockQuantity} + ' available)'"></span>
                                    </td>
                                </tr>
                            </table>
                        </div>

                        <div style="margin-top:20px;">
                            <p th:text="${product.description}" style="line-height:1.8; color:#666;">Product description goes here.</p>
                        </div>

                        <div style="margin-top:25px;">
                            <a th:href="@{/products}" class="btn btn-md btn-third-col"><i class="icon-arrow-left"></i> Continue Shopping</a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Related Products -->
            <div th:if="${relatedProducts != null and !relatedProducts.isEmpty()}" style="margin-top:40px; border-top:2px solid #f0f0f1; padding-top:30px;">
                <h3 style="text-transform:uppercase; letter-spacing:2px; font-size:18px; margin-bottom:25px;">Related Products</h3>
                <div class="row">
                    <div class="col-md-3 col-sm-6 col-xs-12" th:each="rp : ${relatedProducts}" style="margin-bottom:20px;">
                        <div class="product-box">
                            <a th:href="@{/product/{id}(id=${rp.id})}">
                                <div style="background:#f8f8f8; height:200px; display:flex; align-items:center; justify-content:center; overflow:hidden;">
                                    <img th:src="${rp.imageUrl}" th:alt="${rp.name}" style="max-height:100%; max-width:100%; object-fit:cover;">
                                </div>
                            </a>
                            <div style="padding:10px 0;">
                                <p style="margin:5px 0;">
                                    <a th:href="@{/product/{id}(id=${rp.id})}" th:text="${rp.name}" style="color:#212224; font-weight:400; font-size:13px;">Product</a>
                                </p>
                                <span class="active" style="font-weight:600;" th:text="'$' + ${#numbers.formatDecimal(rp.price, 1, 2)}">$0.00</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block th:replace="~{fragments/header :: footer}" />
    <th:block th:replace="~{fragments/header :: scripts}" />
</body>
</html>
