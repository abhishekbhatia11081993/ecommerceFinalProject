<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/header :: head}" />
    <title>Register | Shop+</title>
</head>
<body>

    <th:block th:replace="~{fragments/header :: header}" />

    <div class="pg-header">
        <div class="container">
            <div class="row">
                <div class="col-md-6 col-sm-12 title">
                    <h1>Create Account</h1>
                </div>
                <div class="col-md-6 col-sm-12">
                    <div class="b-crumbs pull-right">
                        <a th:href="@{/products}">Home</a> <i class="arrow_carrot-right"></i> Register
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="pg-body">
        <div class="container">
            <div class="row">
                <div class="col-md-6 col-md-offset-3">
                    <div style="padding: 40px 0;">
                        <h3 class="text-center" style="margin-bottom:30px;">Create Your Account</h3>

                        <div th:if="${errorMessage}" class="alert alert-danger" style="border-radius:0; border:none; background:#f2dede; color:#a94442; padding:12px 15px;">
                            <span th:text="${errorMessage}"></span>
                        </div>

                        <form th:action="@{/register}" method="post">
                            <div class="required form-group">
                                <label class="type-text">Full Name *</label>
                                <input type="text" name="fullName" class="form-control placeholder-fix" placeholder="Enter your full name" required>
                            </div>
                            <div class="required form-group">
                                <label class="type-text">Email *</label>
                                <input type="email" name="email" class="form-control placeholder-fix" placeholder="Enter your email" required>
                            </div>
                            <div class="required form-group">
                                <label class="type-text">Password *</label>
                                <input type="password" name="password" class="form-control placeholder-fix" placeholder="Enter your password" required minlength="6">
                            </div>
                            <div class="form-group text-center" style="margin-top:25px;">
                                <button type="submit" class="btn btn-lg btn-sec-col" style="min-width:200px;">REGISTER</button>
                            </div>
                            <div class="text-center" style="margin-top:15px;">
                                <span>Already have an account? </span>
                                <a th:href="@{/login}" class="active" style="font-weight:600;">Login here</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block th:replace="~{fragments/header :: footer}" />
    <th:block th:replace="~{fragments/header :: scripts}" />
</body>
</html>
