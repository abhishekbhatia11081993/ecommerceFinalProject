# Production profile for AWS Elastic Beanstalk
spring.application.name=ShopPlus

# SQLite - persistent path on EB instance
spring.datasource.url=jdbc:sqlite:/var/app/data/shopplus.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.sqlite.hibernate.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Thymeleaf - enable cache in production
spring.thymeleaf.cache=true

# Server port (Elastic Beanstalk expects 5000)
server.port=5000

# Logging
logging.level.root=WARN
logging.level.com.ecommerce.shopplus=INFO
